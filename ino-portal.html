:root {
  --red: #FF442D; --green-gray: #3D5655;
  --soft: #FCFAF4; --gray80: #333333; --gray60: #666666;
  --gray20: #CCCCCC; --gray10: #E5E5E5; --gray5: #F2F2F2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'GeneralSans', sans-serif; background: var(--soft); min-height: 100vh; color: var(--gray80); }

/* LOGIN */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--green-gray); position: relative; overflow: hidden;
}
#login-screen::before { content: ''; position: absolute; width: 700px; height: 700px; border-radius: 50%; background: rgba(195,220,190,0.07); top: -250px; right: -200px; }
#login-screen::after { content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%; background: rgba(255,68,45,0.05); bottom: -200px; left: -150px; }
.login-card {
  background: white; border-radius: 18px; padding: 52px 48px 44px;
  width: 430px; max-width: 92vw;
  box-shadow: 0 32px 80px rgba(0,0,0,0.22);
  position: relative; z-index: 1;
  animation: slideUp 0.45s cubic-bezier(.22,.8,.36,1) both;
}
@keyframes slideUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
.login-logo { width: 96px; margin-bottom: 34px; display: block; }
.login-card h1 { font-family: 'Ladislav', serif; font-size: 27px; color: var(--green-gray); letter-spacing: 0.02em; margin-bottom: 6px; }
.login-card .subtitle { font-size: 14px; color: var(--gray60); margin-bottom: 34px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray60); margin-bottom: 8px; }
.form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--gray10); border-radius: 9px; font-family: 'GeneralSans', sans-serif; font-size: 15px; color: var(--gray80); background: var(--gray5); transition: border-color .2s, box-shadow .2s; outline: none; }
.form-group input:focus { border-color: var(--red); background: white; box-shadow: 0 0 0 3px rgba(255,68,45,0.10); }
.login-btn { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 9px; font-family: 'Ladislav', serif; font-size: 15px; letter-spacing: 0.06em; cursor: pointer; margin-top: 6px; transition: background .2s, transform .1s, box-shadow .2s; }
.login-btn:hover { background:#e03520; box-shadow: 0 6px 20px rgba(255,68,45,0.28); }
.login-btn:active { transform: scale(.98); }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; display: none; }

/* TOPBAR */
.topbar { background: white; border-bottom: 2px solid var(--gray5); padding: 0 44px; height: 68px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.05); }
.topbar-logo { width: 70px; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.badge { background: var(--green-gray); color: white; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; }
.logout-btn { background: none; border: 1.5px solid var(--gray20); border-radius: 7px; padding: 7px 15px; font-family: 'GeneralSans', sans-serif; font-size: 13px; color: var(--gray60); cursor: pointer; transition: border-color .2s, color .2s; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }

/* DASHBOARD */
#dashboard-screen { display: none; flex-direction: column; min-height: 100vh; }
.dashboard-content { flex: 1; padding: 48px 44px; max-width: 1280px; margin: 0 auto; width: 100%; }
.dashboard-header { margin-bottom: 48px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
.dashboard-header-left h2 { font-family: 'Ladislav', serif; font-size: 38px; color: var(--green-gray); letter-spacing: 0.02em; margin-bottom: 8px; }
.dashboard-header-left p { font-size: 15px; color: var(--gray60); }
.dashboard-header-right { text-align: right; flex-shrink: 0; }
.clock { font-family: 'Ladislav', serif; font-size: 38px; color: var(--green-gray); letter-spacing: 0.02em; line-height: 1; }
.date-line { font-size: 14px; color: var(--gray60); margin-top: 6px; }
.nameday-line { font-size: 13px; color: var(--gray60); margin-top: 3px; opacity: 0.75; }

/* SEKCE */
.section { margin-bottom: 52px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--gray10);
}
.section-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.section-title {
  font-family: 'Ladislav', serif;
  font-size: 20px; letter-spacing: 0.04em;
  color: var(--gray80);
}
.section-count {
  font-size: 12px; color: var(--gray60);
  background: var(--gray5); border-radius: 20px;
  padding: 2px 9px; margin-left: 4px;
}

/* GRID */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 22px; }
.project-card {
  background: white; border: 1px solid rgba(0,0,0,0.07);
  border-radius: 20px; padding: 30px 18px 24px;
  text-decoration: none; color: inherit;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
  animation: fadeCard .4s ease both;
  cursor: pointer;
}
.project-card:hover { transform: translateY(-7px) scale(1.03); box-shadow: 0 22px 48px rgba(0,0,0,0.13); }
.project-card:active { transform: scale(0.97); }

.project-card.inactive { cursor: default; opacity: 0.55; filter: grayscale(40%); }
.project-card.inactive:hover { transform: none; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.project-card.inactive:active { transform: none; }
.coming-soon { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray60); margin-top: 6px; font-weight: 600; }

@keyframes fadeCard { from { opacity:0; transform:translateY(18px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

.card-icon-wrap { width: 88px; height: 88px; margin-bottom: 16px; filter: drop-shadow(0 5px 12px rgba(0,0,0,0.18)); transition: filter .2s, transform .2s; }
.project-card:hover:not(.inactive) .card-icon-wrap { filter: drop-shadow(0 10px 20px rgba(0,0,0,0.22)); transform: scale(1.08) translateY(-3px); }
.card-icon-wrap svg { width: 100%; height: 100%; }
.card-title { font-family: 'Ladislav', serif; font-size: 14.5px; color: var(--gray80); letter-spacing: 0.01em; line-height: 1.35; }

/* TOAST */
.info-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: white; border: 1px solid var(--gray10);
  border-radius: 12px; padding: 13px 20px;
  margin-bottom: 40px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  font-size: 14px; color: var(--gray60);
}
.info-bar-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.info-bar-item strong { color: var(--green-gray); font-weight: 700; }
.info-bar-sep { color: var(--gray20); font-size: 18px; user-select: none; }
.info-bar-loading { color: var(--gray20); font-style: italic; font-size: 13px; }

.tax-calendar {
  margin-top: 40px;
  background: white;
  border: 1px solid var(--gray10);
  border-radius: 14px;
  padding: 24px 28px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.tax-calendar-title {
  font-family: 'Ladislav', serif;
  font-size: 17px; color: var(--green-gray);
  letter-spacing: 0.03em; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.tax-items { display: flex; flex-direction: column; gap: 8px; }
.tax-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 10px 14px; border-radius: 9px;
  font-size: 14px;
}
.tax-item.urgent { background: rgba(255,68,45,0.07); border-left: 3px solid var(--red); }
.tax-item.soon   { background: rgba(255,167,38,0.07); border-left: 3px solid #FFA726; }
.tax-item.normal { background: var(--gray5); border-left: 3px solid var(--gray20); }
.tax-item.past   { opacity: 0.4; }
.tax-date { font-family: 'Ladislav', serif; font-size: 14px; color: var(--green-gray); min-width: 52px; flex-shrink: 0; }

// ── INFO BAR ─────────────────────────────────────────────
function getWeekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function getCzechHolidays(year) {
  // Pevné státní svátky ČR
  const fixed = [
    `${year}-01-01`, `${year}-05-01`, `${year}-05-08`,
    `${year}-07-05`, `${year}-07-06`, `${year}-09-28`,
    `${year}-10-28`, `${year}-11-17`, `${year}-12-24`,
    `${year}-12-25`, `${year}-12-26`
  ];
  // Velikonoce (Gauss)
  const a = year % 19, b = Math.floor(year/100), c = year % 100;
  const d = Math.floor(b/4), e = b % 4, f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3), h = (19*a+b-d-g+15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32+2*e+2*i-h-k) % 7;
  const m = Math.floor((a+11*h+22*l)/451);
  const month = Math.floor((h+l-7*m+114)/31);
  const day = ((h+l-7*m+114) % 31) + 1;
  const easter = new Date(year, month-1, day);
  // Velký pátek
  const gf = new Date(easter); gf.setDate(gf.getDate()-2);
  // Velikonoční pondělí
  const em = new Date(easter); em.setDate(em.getDate()+1);
  const fmt = d => d.toISOString().slice(0,10);
  return new Set([...fixed, fmt(gf), fmt(em)]);
}

function updateInfoBar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const lastDay = new Date(year, month + 1, 0).getDate();
  const today = now.getDate();
  const daysLeft = lastDay - today;

  const holidays = getCzechHolidays(year);
  let workdays = 0;
  for (let d = today + 1; d <= lastDay; d++) {
    const date = new Date(year, month, d);
    const dow = date.getDay();
    const iso = date.toISOString().slice(0,10);
    if (dow !== 0 && dow !== 6 && !holidays.has(iso)) workdays++;
  }

  const week = getWeekNumber(now);
  const HOLIDAY_NAMES = {
    '01-01': 'Nový rok', '05-01': 'Svátek práce', '05-08': 'Den vítězství',

    '12-24': 'Štědrý den', '12-25': 'Boží hod', '12-26': 'Štěpán'
  };

  // Svátky tento měsíc
  const monthStr = String(month+1).padStart(2,'0');
  const monthHolidays = [];
  holidays.forEach(iso => {
    if (iso.startsWith(year + '-' + monthStr)) {
      const d = parseInt(iso.slice(8,10));
      const mmdd = iso.slice(5);
      // Velikonoce nemají pevný název v HOLIDAY_NAMES, doplníme
      let name = HOLIDAY_NAMES[mmdd];
      if (!name) {
        const dow = new Date(iso).getDay();
        name = dow === 5 ? 'Velký pátek' : 'Vel. pondělí';
      }
      monthHolidays.push(d + '. ' + name);
    }
  });
  monthHolidays.sort((a,b) => parseInt(a) - parseInt(b));

  const dl = document.getElementById('days-left');
  const wd = document.getElementById('workdays-left');
  const wn = document.getElementById('week-num');
  const hm = document.getElementById('holidays-this-month');

  if (dl) dl.innerHTML = '<strong>' + daysLeft + '</strong> dní do konce měsíce';

  // Svátek do info lišty
  const nbEl = document.getElementById('nameday-bar');
  if (nbEl) {
    const ndKey = now.getDate() + '.' + (now.getMonth()+1);
    const ndName = NAMEDAYS[ndKey];
    nbEl.innerHTML = ndName ? 'Dnes slaví: <strong style="color:var(--green-gray);font-weight:700;">' + ndName + '</strong>' : 'Dnes není svátek';
  }
  if (wd) wd.innerHTML = '<strong>' + workdays + '</strong> pracovních dní do konce měsíce';
  if (wn) wn.innerHTML = '<strong>' + week + '</strong>. týden v roce';
  if (hm) {
    if (monthHolidays.length > 0) {
      hm.innerHTML = monthHolidays.map(h => '<strong>' + h + '</strong>').join(', ');
    } else {
      hm.innerHTML = '<span style=\"color:var(--gray20)\">žádné svátky</span>';
    }
  }
}

let sTimer, wTimer;

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const h = await sha256(document.getElementById('pw').value);
  if (h === USER_HASH) launch();
  else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw').value = ''; document.getElementById('pw').focus();
  }
}
function launch() {
  const exp = Date.now() + SESSION_MS;
  sessionStorage.setItem('ino_e', exp);
  show(exp - Date.now());
}
function show(ms) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'flex';
  document.getElementById('pw').value = '';
  document.getElementById('login-error').style.display = 'none';
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h<12?'Dobré ráno.':h<17?'Dobrý den.':'Dobrý večer.';
  render(); armTimers(ms);
  updateClock();
  if (!window._clockInterval) window._clockInterval = setInterval(updateClock, 1000);
  updateInfoBar();
  showQuote();
}

function getIcon(p) {
  return ICONS[p.icon_key] || `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" rx="13" fill="#999"/></svg>`;
}

function render() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let cardIdx = 0;
  SECTIONS.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header">
        <div class="section-dot" style="background:${sec.color}"></div>
        <span class="section-title">${sec.title}</span>
        <span class="section-count">${sec.projects.length} ${sec.projects.length <= 4 ? 'aplikace' : 'aplikací'}</span>
      </div>
      <div class="projects-grid" id="grid-${sec.title}"></div>
    `;
    container.appendChild(section);

    const grid = section.querySelector('.projects-grid');
    sec.projects.forEach(p => {
      const inactive = !p.url || p.url === '#';
      const el = document.createElement(inactive ? 'div' : 'a');
      if (!inactive) el.href = p.url;
      el.className = 'project-card' + (inactive ? ' inactive' : '');
      el.style.animationDelay = (cardIdx * 0.06) + 's';
      el.innerHTML = `
        <div class="card-icon-wrap">${getIcon(p)}</div>
        <div class="card-title">${p.name}</div>
        ${inactive ? '<div class="coming-soon">Připravujeme</div>' : ''}
      `;
      grid.appendChild(el);
      cardIdx++;
    });
  });
}

function doLogout() {
  sessionStorage.clear(); clearTimeout(sTimer); clearTimeout(wTimer);
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw').focus();
}
function armTimers(ms) {
  clearTimeout(sTimer); clearTimeout(wTimer);
  const warn = ms - 5*60*1000;
  if(warn>0) wTimer = setTimeout(()=>{ document.getElementById('sw').style.display='block'; }, warn);
  sTimer = setTimeout(()=>{ showToast('Relace vypršela'); doLogout(); }, ms);
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
(()=>{
  const e = parseInt(sessionStorage.getItem('ino_e')||'0');
  if(Date.now() < e) show(e - Date.now());
})();
