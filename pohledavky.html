<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INO – Ceníková tabulka</title>
<style>
  @font-face {
    font-family: 'GeneralSans';
    src: url('GeneralSans-Variable.ttf') format('truetype');
    font-weight: 100 900;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:    #FF442D;
    --gray10: #E5E5E5;
    --gray60: #666666;
  }

  html, body {
    height: 100%;
    font-family: 'GeneralSans', 'Helvetica Neue', sans-serif;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 0 28px;
    height: 58px;
    background: #fff;
    border-bottom: 1px solid var(--gray10);
    flex-shrink: 0;
  }

  .logo svg { height: 22px; width: auto; display: block; }

  .sheet { flex: 1; position: relative; }

  .sheet iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .loader {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #fff;
    z-index: 2;
    transition: opacity .3s;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--gray10);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text { font-size: 13px; color: var(--gray60); }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="#">
    <svg viewBox="0 0 407.1 206.3" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FF442D" d="M0,202.8h30V6.5H0V202.8z M185.3,166.3V6.4h-29.9v159.9c0,5.5-4.5,10-10,10
        c-5.5,0-10-4.5-10-10V39.9c0-22-17.9-39.9-39.9-39.9c-22,0-39.9,17.9-39.9,39.9v7.6v154.4h29.9V47.5v-7.6
        c0-5.5,4.5-10,10-10c5.5,0,10,4.5,10,10v126.4c0,22,17.9,39.9,39.9,39.9C167.4,206.2,185.3,188.3,185.3,166.3
        M377,104.3c0,41.4-31.2,73.1-72,73.1c-40.8,0-72-31.7-72-73.1s31.2-73.1,72-73.1C345.9,31.2,377,62.9,377,104.3
        M407.1,104.3c0-57.8-44.2-102-102-102s-102,44.2-102,102c0,57.8,44.2,102,102,102S407.1,162.1,407.1,104.3"/>
    </svg>
  </a>
</div>

<div class="sheet">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span class="loader-text">Načítám tabulku…</span>
  </div>
  <iframe
    src="https://docs.google.com/spreadsheets/d/13MnSlBAh6BZcnJllcDoU85QBameezka4/edit?usp=sharing&embedded=true&rm=minimal"
    title="Ceníková tabulka INO"
    onload="document.getElementById('loader').classList.add('hidden')"
  ></iframe>
</div>

</body>
</html>
