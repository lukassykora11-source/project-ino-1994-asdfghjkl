:root {
  --red: #FF442D;
  --gg: #3D5655;
  --pg: #C3DCBE;
  --bg: #FCFAF4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'GS', sans-serif; font-weight: 300; background: #18272b; min-height: 100vh; }

/* ── PICKER ── */
#picker {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  padding: 40px 20px;
}
#picker svg.logo { height: 52px; width: auto; }
.p-title {
  font-family: 'Ladislav', sans-serif;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--pg);
  opacity: 0.7;
}
.p-question {
  font-family: 'Ladislav', sans-serif;
  font-size: 26px;
  color: var(--bg);
}
.p-cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
.p-card {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(195,220,190,0.2);
  border-radius: 14px;
  padding: 22px 28px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  min-width: 110px;
}
.p-card:hover { border-color: var(--red); background: rgba(255,68,45,0.1); transform: translateY(-2px); }
.p-num { font-family: 'Ladislav', sans-serif; font-size: 38px; color: var(--red); line-height: 1; margin-bottom: 4px; }
.p-lbl { font-size: 11px; color: var(--pg); letter-spacing: 1px; text-transform: uppercase; font-weight: 400; }

/* ── EDITOR ── */
#editor { display: none; flex-direction: row; min-height: 100vh; }

/* Sidebar */
.sb {
  width: 290px;
  min-width: 290px;
  background: #1e2f2e;
  display: flex;
  flex-direction: column;
  border-right: 1px solid rgba(195,220,190,0.08);
  height: 100vh;
  position: sticky;
  top: 0;
  overflow-y: auto;
}
.sb-head {
  padding: 16px 18px 14px;
  border-bottom: 1px solid rgba(195,220,190,0.08);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sb-head svg { height: 26px; width: auto; }
.sb-head-title { font-family: 'Ladislav', sans-serif; font-size: 17px; color: var(--bg); }
.sb-head-title span { color: var(--red); }
.sb-sec { padding: 12px 16px; border-bottom: 1px solid rgba(195,220,190,0.06); }
.sb-sec.grow { flex: 1; }
.sb-lbl { font-size: 9px; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(195,220,190,0.5); margin-bottom: 8px; }
.f { margin-bottom: 7px; }
.f-lbl { font-size: 9px; color: rgba(195,220,190,0.45); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.f input, .f textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(195,220,190,0.12);
  border-radius: 6px;
  padding: 7px 9px;
  color: var(--bg);
  font-family: 'GS', sans-serif;
  font-size: 12px;
  font-weight: 300;
  resize: none;
}
.f input:focus, .f textarea:focus { outline: none; border-color: var(--red); }
.f input::placeholder, .f textarea::placeholder { color: rgba(252,250,244,0.22); }

/* Product panels */
.pp { background: rgba(255,255,255,0.03); border-radius: 7px; margin-bottom: 7px; overflow: hidden; }
.pp-head {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 11px; cursor: pointer;
  border-bottom: 1px solid rgba(195,220,190,0.06);
}
.pp-head:hover { background: rgba(255,255,255,0.03); }
.pp-n { font-family: 'Ladislav', sans-serif; font-size: 14px; color: var(--red); min-width: 16px; }
.pp-name { font-size: 11px; color: var(--bg); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300; }
.pp-tog { color: rgba(195,220,190,0.4); font-size: 12px; transition: transform 0.2s; }
.pp-tog.open { transform: rotate(180deg); }
.pp-body { padding: 9px 11px; display: flex; flex-direction: column; gap: 6px; }

/* Image upload */
.iu {
  border: 2px dashed rgba(195,220,190,0.2);
  border-radius: 6px;
  min-height: 54px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; transition: all 0.2s;
}
.iu:hover { border-color: var(--red); background: rgba(255,68,45,0.05); }
.iu.has-img { border-style: solid; border-color: rgba(195,220,190,0.3); padding: 3px; }
.iu.has-img img { max-width: 100%; max-height: 56px; border-radius: 4px; object-fit: cover; }
.iu input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.iu-hint { font-size: 10px; color: rgba(195,220,190,0.32); pointer-events: none; font-weight: 300; }

/* Buttons */
.btn-pdf {
  margin: 12px 16px 5px;
  background: var(--red); color: white; border: none; border-radius: 8px;
  padding: 12px; font-family: 'Ladislav', sans-serif; font-size: 15px;
  letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.2s;
}
.btn-pdf:hover { background: #e03520; box-shadow: 0 4px 14px rgba(255,68,45,0.35); }
.btn-back {
  margin: 4px 16px 16px;
  background: transparent; color: rgba(195,220,190,0.45);
  border: 1px solid rgba(195,220,190,0.1);
  border-radius: 8px; padding: 8px; font-family: 'GS', sans-serif;
  font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.btn-back:hover { color: var(--bg); border-color: rgba(195,220,190,0.3); }

/* Canvas */
.canvas {
  flex: 1; background: #141f1e; padding: 30px;
  display: flex; flex-direction: column; align-items: center; overflow-y: auto;
}
.canvas-hint {
  font-size: 11px; color: rgba(195,220,190,0.3); margin-bottom: 18px; font-weight: 300;
}

/* ── LETÁK A4 ──
   96dpi: 1mm = 3.7795px
   A4 = 210mm × 297mm = 793.7 × 1122.5px
   Zobrazujeme šířku 700px → scale = 700/793.7 = 0.8819
   výška = 297 * 3.7795 * 0.8819 = 990px
   Ale pro jednoduchost: width 700, height 990
*/
.letak-outer { width: 700px; }
.letak {
  width: 700px;
  height: 990px;
  background: var(--bg);
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 0 20px 70px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

/* Header */
.lh {
  background: white;
  padding: 16px 24px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.lh-left { display: flex; align-items: center; gap: 14px; }
.lh svg.logo { height: 34px; width: auto; }
.lh-tagline { font-family: 'Ladislav', sans-serif; font-size: 14px; color: var(--gg); }
.lh-right { text-align: right; }
.lh-validity { font-size: 10px; font-weight: 300; color: #aaa; margin-bottom: 2px; }
.lh-promo { font-family: 'Ladislav', sans-serif; font-size: 16px; color: var(--gg); }

.redbar { background: var(--red); height: 5px; flex-shrink: 0; }

/* Products grid */
.lp {
  background: var(--pg);
  flex: 1;
  min-height: 0;
  display: grid;
  padding: 14px 16px;
  gap: 10px;
}
.lp.n1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.lp.n2 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
.lp.n4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.lp.n6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
.lp.n8 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr 1fr; }

/* Card */
.lc {
  background: white;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 2px 8px rgba(61,86,85,0.12);
  min-height: 0;
}

/* Layout 2 — obrázek vlevo, text vpravo */
.lp.n2 .lc { flex-direction: row; }
.lp.n2 .lc-img { width: 55%; flex-shrink: 0; min-height: 0; }
.lp.n2 .lc-body { justify-content: center; padding: 20px 22px; }

.lc-img {
  background: #eef5ec;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
/* Layout 1 — obrázek roste */
.lp.n1 .lc-img { flex: 1; min-height: 0; }
/* Ostatní — fixní výšky */
.lp.n4 .lc-img { height: 56%; }
.lp.n6 .lc-img { height: 54%; }
.lp.n8 .lc-img { height: 50%; }

.lc-img img { width: 100%; height: 100%; object-fit: cover; }
.lc-img-ph {
  display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.32;
}
.lc-img-ph span { font-size: 9px; font-weight: 300; color: var(--gg); }

.lc-body {
  padding: 10px 12px 12px;
  display: flex; flex-direction: column; gap: 3px;
  flex-shrink: 0;
}
.lp.n1 .lc-body { padding: 16px 20px 18px; flex-shrink: 0; }
.lp.n2 .lc-body { flex-shrink: 1; flex: 1; min-height: 0; }
.lp.n8 .lc-body { padding: 7px 9px 9px; }

.lc-tag {
  font-size: 8px; font-weight: 400; letter-spacing: 1.8px;
  text-transform: uppercase; color: var(--gg); min-height: 11px;
}
.lc-name { font-family: 'Ladislav', sans-serif; color: #111; line-height: 1.15; }
.lp.n1 .lc-name { font-size: 28px; }
.lp.n2 .lc-name { font-size: 22px; }
.lp.n4 .lc-name { font-size: 16px; }
.lp.n6 .lc-name { font-size: 14px; }
.lp.n8 .lc-name { font-size: 13px; }

.lc-desc { font-size: 11px; font-weight: 300; color: #777; line-height: 1.5; }
.lp.n1 .lc-desc { font-size: 13px; line-height: 1.6; }
.lp.n2 .lc-desc { font-size: 12px; }
.lp.n8 .lc-desc { font-size: 10px; display: none; }

.lc-pr {
  margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee;
}
.lp.n8 .lc-pr { margin-top: 5px; padding-top: 5px; }

.lc-price {
  font-family: 'GS', sans-serif; font-weight: 300;
  color: var(--red); line-height: 1; letter-spacing: -0.3px;
}
.lp.n1 .lc-price { font-size: 34px; }
.lp.n2 .lc-price { font-size: 28px; }
.lp.n4 .lc-price { font-size: 22px; }
.lp.n6 .lc-price { font-size: 20px; }
.lp.n8 .lc-price { font-size: 16px; }

.lc-pnote { font-size: 9px; font-weight: 300; color: #aaa; margin-top: 2px; display: block; }

/* Footer */
.lf {
  background: white;
  border-top: 3px solid var(--pg);
  padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.lf-note { font-size: 10px; font-weight: 300; color: #aaa; }
.lf-url { font-family: 'Ladislav', sans-serif; font-size: 15px; color: var(--red); }
.greenbar { background: var(--gg); height: 6px; flex-shrink: 0; }

/* ── PRINT ── */
@media print {
  body { background: white !important; }
  #picker { display: none !important; }
  #editor { display: flex !important; }
  .sb, .canvas-hint { display: none !important; }
  .canvas { padding: 0 !important; background: white !important; display: block !important; }
  .letak-outer, .letak { width: 100% !important; }
  .letak { height: auto !important; min-height: 100vh; box-shadow: none !important; border-radius: 0 !important; }
  .lp { flex: 1; }
  @page { size: A4 portrait; margin: 0; }
}
</style>
</head>
<body>

<!-- PICKER -->
<div id="picker">
  <svg class="logo" viewBox="0 0 407.1 206.3" xmlns="http://www.w3.org/2000/svg"><path fill="#FF442D" d="M0,202.8h30V6.5H0V202.8z M185.3,166.3V6.4h-29.9v159.9c0,5.5-4.5,10-10,10c-5.5,0-10-4.5-10-10V39.9c0-22-17.9-39.9-39.9-39.9c-22,0-39.9,17.9-39.9,39.9v7.6v154.4h29.9V47.5v-7.6c0-5.5,4.5-10,10-10c5.5,0,10,4.5,10,10v126.4c0,22,17.9,39.9,39.9,39.9C167.4,206.2,185.3,188.3,185.3,166.3 M377,104.3c0,41.4-31.2,73.1-72,73.1c-40.8,0-72-31.7-72-73.1s31.2-73.1,72-73.1C345.9,31.2,377,62.9,377,104.3 M407.1,104.3c0-57.8-44.2-102-102-102s-102,44.2-102,102c0,57.8,44.2,102,102,102S407.1,162.1,407.1,104.3"/></svg>
  <div class="p-title">INO Leták Editor</div>
  <div class="p-question">Kolik produktů na letáku?</div>
  <div class="p-cards">
    <div class="p-card" onclick="startEditor(1)"><div class="p-num">1</div><div class="p-lbl">produkt</div></div>
    <div class="p-card" onclick="startEditor(2)"><div class="p-num">2</div><div class="p-lbl">produkty</div></div>
    <div class="p-card" onclick="startEditor(4)"><div class="p-num">4</div><div class="p-lbl">produkty</div></div>
    <div class="p-card" onclick="startEditor(6)"><div class="p-num">6</div><div class="p-lbl">produktů</div></div>
    <div class="p-card" onclick="startEditor(8)"><div class="p-num">8</div><div class="p-lbl">produktů</div></div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor">
  <div class="sb">
    <div class="sb-head">
      <svg viewBox="0 0 407.1 206.3" xmlns="http://www.w3.org/2000/svg"><path fill="#FF442D" d="M0,202.8h30V6.5H0V202.8z M185.3,166.3V6.4h-29.9v159.9c0,5.5-4.5,10-10,10c-5.5,0-10-4.5-10-10V39.9c0-22-17.9-39.9-39.9-39.9c-22,0-39.9,17.9-39.9,39.9v7.6v154.4h29.9V47.5v-7.6c0-5.5,4.5-10,10-10c5.5,0,10,4.5,10,10v126.4c0,22,17.9,39.9,39.9,39.9C167.4,206.2,185.3,188.3,185.3,166.3 M377,104.3c0,41.4-31.2,73.1-72,73.1c-40.8,0-72-31.7-72-73.1s31.2-73.1,72-73.1C345.9,31.2,377,62.9,377,104.3 M407.1,104.3c0-57.8-44.2-102-102-102s-102,44.2-102,102c0,57.8,44.2,102,102,102S407.1,162.1,407.1,104.3"/></svg>
      <div class="sb-head-title"><span>INO</span> Editor</div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Hlavička</div>
      <div class="f"><div class="f-lbl">Název akce</div><input id="f-promo" type="text" placeholder="Jarní akce 2025" oninput="render()"></div>
      <div class="f"><div class="f-lbl">Platnost</div><input id="f-validity" type="text" placeholder="Platí do: 31. 5. 2025" oninput="render()"></div>
    </div>

    <div class="sb-sec grow">
      <div class="sb-lbl">Produkty</div>
      <div id="pp-wrap"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-lbl">Patička</div>
      <div class="f"><div class="f-lbl">Web</div><input id="f-url" type="text" placeholder="www.ino.cz" oninput="render()"></div>
      <div class="f"><div class="f-lbl">Poznámka</div><input id="f-note" type="text" placeholder="Ceny jsou uvedeny bez DPH." oninput="render()"></div>
    </div>

    <button class="btn-pdf" onclick="window.print()">&#8595; Uložit jako PDF</button>
    <button class="btn-back" onclick="goBack()">&#8592; Zpět na výběr</button>
  </div>

  <div class="canvas">
    <div class="canvas-hint">Náhled A4 &nbsp;·&nbsp; Tisk: Uložit jako PDF, A4, bez okrajů, zapnout grafiku na pozadí</div>
    <div class="letak-outer">
      <div class="letak" id="letak"></div>
    </div>
  </div>
</div>

<script>
var count = 0;
var prods = [];

var LOGO_SVG = '<svg class="logo" viewBox="0 0 407.1 206.3" xmlns="http://www.w3.org/2000/svg"><path fill="#FF442D" d="M0,202.8h30V6.5H0V202.8z M185.3,166.3V6.4h-29.9v159.9c0,5.5-4.5,10-10,10c-5.5,0-10-4.5-10-10V39.9c0-22-17.9-39.9-39.9-39.9c-22,0-39.9,17.9-39.9,39.9v7.6v154.4h29.9V47.5v-7.6c0-5.5,4.5-10,10-10c5.5,0,10,4.5,10,10v126.4c0,22,17.9,39.9,39.9,39.9C167.4,206.2,185.3,188.3,185.3,166.3 M377,104.3c0,41.4-31.2,73.1-72,73.1c-40.8,0-72-31.7-72-73.1s31.2-73.1,72-73.1C345.9,31.2,377,62.9,377,104.3 M407.1,104.3c0-57.8-44.2-102-102-102s-102,44.2-102,102c0,57.8,44.2,102,102,102S407.1,162.1,407.1,104.3"/></svg>';

var PH_SVG = '<div class="lc-img-ph"><svg width="32" height="32" viewBox="0 0 44 44" fill="none"><rect x="2" y="6" width="40" height="30" rx="4" stroke="#8ab08a" stroke-width="1.8" fill="none"/><circle cx="14" cy="16" r="4" stroke="#8ab08a" stroke-width="1.8" fill="none"/><path d="M2 28 L14 18 L24 26 L32 20 L42 30" stroke="#8ab08a" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg><span>Foto produktu</span></div>';

function startEditor(n) {
  count = n;
  prods = [];
  for (var i = 0; i < n; i++) {
    prods.push({ name: '', tag: '', desc: '', price: '', img: null });
  }
  document.getElementById('picker').style.display = 'none';
  document.getElementById('editor').style.display = 'flex';
  buildPanels();
  render();
}

function goBack() {
  document.getElementById('picker').style.display = 'flex';
  document.getElementById('editor').style.display = 'none';
  var ids = ['f-promo','f-validity','f-url','f-note'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).value = '';
  }
}

function buildPanels() {
  var wrap = document.getElementById('pp-wrap');
  wrap.innerHTML = '';
  for (var i = 0; i < count; i++) {
    var d = document.createElement('div');
    d.className = 'pp';
    d.innerHTML =
      '<div class="pp-head" onclick="togglePP(' + i + ')">' +
        '<span class="pp-n">' + (i+1) + '</span>' +
        '<span class="pp-name" id="ppname' + i + '">Produkt ' + (i+1) + '</span>' +
        '<span class="pp-tog' + (i===0?' open':'') + '" id="pptog' + i + '">&#9662;</span>' +
      '</div>' +
      '<div class="pp-body" id="ppbody' + i + '" style="' + (i===0?'':'display:none') + '">' +
        '<div class="f-lbl">Foto</div>' +
        '<div class="iu" id="iu' + i + '">' +
          '<span class="iu-hint">Klikn&#283;te pro nahr&#225;n&#237; fotky</span>' +
          '<input type="file" accept="image/*" onchange="handleImg(event,' + i + ')">' +
        '</div>' +
        '<div class="f"><div class="f-lbl">&#352;t&#237;tek (NOVINKA, AKCE&hellip;)</div><input type="text" placeholder="NOVINKA" oninput="updProd(' + i + ',\'tag\',this.value)"></div>' +
        '<div class="f"><div class="f-lbl">N&#225;zev produktu</div><input type="text" placeholder="N&#225;zev produktu" oninput="updProd(' + i + ',\'name\',this.value)"></div>' +
        '<div class="f"><div class="f-lbl">Popis</div><textarea rows="2" placeholder="Kr&#225;tk&#253; popis&hellip;" oninput="updProd(' + i + ',\'desc\',this.value)"></textarea></div>' +
        '<div class="f"><div class="f-lbl">Cena</div><input type="text" placeholder="1 290 K&#269;" oninput="updProd(' + i + ',\'price\',this.value)"></div>' +
      '</div>';
    wrap.appendChild(d);
  }
}

function togglePP(i) {
  var body = document.getElementById('ppbody' + i);
  var tog = document.getElementById('pptog' + i);
  var open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'flex';
  if (open) { tog.className = 'pp-tog'; } else { tog.className = 'pp-tog open'; }
}

function updProd(i, key, val) {
  prods[i][key] = val;
  var el = document.getElementById('ppname' + i);
  if (el) el.textContent = prods[i].name || ('Produkt ' + (i+1));
  render();
}

function handleImg(e, i) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    prods[i].img = ev.target.result;
    var area = document.getElementById('iu' + i);
    area.className = 'iu has-img';
    area.innerHTML = '<img src="' + ev.target.result + '"><input type="file" accept="image/*" onchange="handleImg(event,' + i + ')">';
    render();
  };
  reader.readAsDataURL(file);
}

function gv(id) {
  var el = document.getElementById(id);
  return el ? el.value : '';
}

function render() {
  var promo    = gv('f-promo')    || 'N&#225;zev akce';
  var validity = gv('f-validity') || 'Platnost nab&#237;dky';
  var url      = gv('f-url')      || 'www.ino.cz';
  var note     = gv('f-note')     || 'Ceny jsou uvedeny bez DPH.';

  var cards = '';
  for (var i = 0; i < prods.length; i++) {
    var p = prods[i];
    var imgHtml = p.img ? '<img src="' + p.img + '" alt="">' : PH_SVG;
    var desc = (count <= 6 && p.desc) ? '<div class="lc-desc">' + p.desc + '</div>' : '';
    cards +=
      '<div class="lc">' +
        '<div class="lc-img">' + imgHtml + '</div>' +
        '<div class="lc-body">' +
          '<div class="lc-tag">' + (p.tag || '\u00a0') + '</div>' +
          '<div class="lc-name">' + (p.name || 'N&#225;zev produktu') + '</div>' +
          desc +
          '<div class="lc-pr">' +
            '<div class="lc-price">' + (p.price || '&mdash;') + '</div>' +
            '<span class="lc-pnote">cena bez DPH</span>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  var letak = document.getElementById('letak');
  letak.innerHTML =
    '<div class="lh">' +
      '<div class="lh-left">' +
        LOGO_SVG +
        '<div class="lh-tagline">Inteligentn&#237; odpov&#283;&#271; na pot&#345;eby kancel&#225;&#345;&#237;</div>' +
      '</div>' +
      '<div class="lh-right">' +
        '<div class="lh-validity">' + validity + '</div>' +
        '<div class="lh-promo">' + promo + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="redbar"></div>' +
    '<div class="lp n' + count + '">' + cards + '</div>' +
    '<div class="lf">' +
      '<div class="lf-note">' + note + '</div>' +
      '<div class="lf-url">' + url + '</div>' +
    '</div>' +
    '<div class="greenbar"></div>';
}
</script>
</body>
</html>
